<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Your Body Cat</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #fff;
      font-family: Arial, sans-serif;
    }
    video {
  width: 400px;
  height: 400px;
  object-fit: cover;
  margin-bottom: 20px;
  display: none;
  border-radius: 12px;
}
    h1 {
      font-size: 24px;
      text-align: center;
      min-height: 40px;
    }
    .big {
      font-size: 48px;
      transform: scale(1.3);
      color: #000000;
    }
  </style>
</head>
<body>
  
  <video id="cat" muted loop playsinline>
    <source src="cat-dance.mp4" type="video/mp4">
    <source src="cat-dance.webm" type="video/webm">
    Your browser does not support HTML5 video.
  </video>

  
  <h1 id="lyrics"></h1>

  <script>
    const lyrics = [
      { text: "I wanna da-, \nI wanna dance in the lights", delay: 500 },
      { text: "I wanna ro-, \nI wanna rock your body", delay: 600 },
      { text: "I wanna go, \nI wanna go for a ride", delay: 600 },
      { text: "Hop in the music", delay: 700 },
      { text: "AND", delay: 300, big: false },
      { text: "ROCK", delay: 300, big: true },
      { text: "YOUR", delay: 300, big: true },
      { text: "BODY", delay: 300, big: true },
      { text: "", delay: 2000 },   
      { text: "ROCK", delay: 500, big: true },
      { text: "YOUR", delay: 500, big: true },
      { text: "BODY", delay: 600, big: true },
      { text: "", delay: 3000 },   
    ];

    let lineIndex = 0;
    let charIndex = 0;
    const speed = 80;
    const display = document.getElementById("lyrics");
    const cat = document.getElementById("cat");

    function typeLine() {
      if (lineIndex >= lyrics.length) return; 
      const currentLine = lyrics[lineIndex].text;
      const currentDelay = lyrics[lineIndex].delay;
      const isBig = lyrics[lineIndex].big || false;

      
      if (lineIndex === 8 || lineIndex === 12) {
        display.innerHTML = "";
        cat.style.display = "block";
        cat.play();

        setTimeout(() => {
          cat.style.display = "none";
          cat.pause();
          cat.currentTime = 0;

          lineIndex++;
          charIndex = 0;
          if (lineIndex < lyrics.length) typeLine();
        }, currentDelay);
        return;
      }

      
      if (["AND", "ROCK", "YOUR", "BODY"].includes(currentLine)) {
        display.innerHTML = currentLine;
        if (isBig) display.classList.add("big");
        else display.classList.remove("big");

        setTimeout(() => {
          display.innerHTML = "";
          display.classList.remove("big");
          lineIndex++;
          charIndex = 0;
          if (lineIndex < lyrics.length) typeLine();
        }, currentDelay);

        return;
      }

      
      if (charIndex < currentLine.length) {
        let char = currentLine.charAt(charIndex);
        if (char === "\n") {
          display.innerHTML += "<br>";
        } else {
          display.innerHTML += char;
        }
        charIndex++;
        setTimeout(typeLine, speed);
      } else {
        cat.style.display = "none";
        cat.pause();
        cat.currentTime = 0;

        setTimeout(() => {
          display.innerHTML = "";
          charIndex = 0;
          lineIndex++;
          if (lineIndex < lyrics.length) typeLine();
        }, currentDelay);
      }
    }

    // Start typing
    typeLine();
  </script>
</body>
</html>
